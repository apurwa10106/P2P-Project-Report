<!DOCTYPE html>
<html>
<head>
<title>Submit Project</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Submit Your Project</h1>

<div class="glass">

<button class="btn">Generate Plan 🚀</button>

</form>

</div>

<script src="script.js"></script>
</body>
</html>
